<section class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <dialog open class="w-full max-w-lg rounded-xl bg-white shadow-xl p-6">

    @if(config.title){
    <header class="mb-4">
      <h2 class="text-lg font-semibold">{{ config.title }}</h2>
    </header>
    }

    <main class="mb-6">
      <ng-container *cdkPortalOutlet="portal"></ng-container>
    </main>

    <footer class="flex justify-end gap-2">
      <button
        class="px-4 py-2 rounded bg-gray-200 hover:bg-gray-300"
        (click)="close()">
        Chiudi
      </button>
    </footer>

  </dialog>

</section>
