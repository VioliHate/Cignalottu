<header class="tracking-widest sticky top-0 z-50 border-b w-full bg-white/80 backdrop-blur-md border-b-barber-border
 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <a routerLink="/"
         class="text-2xl font-bold tracking-tight flex items-center gap-3 hover:opacity-80 transition-opacity">
        <div class="w-17 h-17 shrink-0 overflow-hidden rounded-full border-2 border-barber-border shadow-sm">
          <img
            ngSrc="/icon.jpg"
            alt="Cignalottu"
            width="784"
            height="1168"
            class="w-full h-full object-cover"
            priority
          />
        </div>
        <span>Cignalottu</span>
      </a>

      <!-- Nav desktop -->
      <nav class="hidden gap-10 md:flex">
        @for (category of categories; track category) {
          <a routerLink="/cat1" class="text-sm font-medium transition-colors hover:text-barber-accent">
            {{ category }}
          </a>
        }
      </nav>

      <!-- Right side icons -->
      <div class="flex items-center gap-x-5">
        <a routerLink="/login" class="hidden sm:block">
          <lucide-icon
            [name]="UserIcon"
            class="h-5 w-5 cursor-pointer hover:text-barber-accent"></lucide-icon>
        </a>

        <div class="relative">
          <a routerLink="/login" class="hidden sm:block">
            <lucide-icon
              [name]="ShoppingBag"
              class="h-5 w-5 cursor-pointer hover:text-barber-accent"></lucide-icon>

            @if (cartCount > 0) {
              <span
                class="absolute -top-1.5 -right-1.5 bg-barber-red text-barber-cream text-[10px] font-medium rounded-full min-w-3.5 h-3.5 flex items-center justify-center px-1">
              {{ cartCount }}
            </span>
            }
          </a>
        </div>

        <!-- Hamburger -->
        <button class="md:hidden" (click)="mobileMenuOpen = !mobileMenuOpen">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            @if (!mobileMenuOpen) {
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            }
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="md:hidden bg-white/80 border-t border-barber-dark/30">
      <div class="px-4 py-5 space-y-4 text-sm">
        @for (category of categories; track category) {
          <a routerLink="/cat1" class="block text-sm font-medium">
            {{ category }}
          </a>
        }
        <a routerLink="/login" class="block font-bold text-barber-accent">Account</a>
        <a routerLink="/carrello" class="block font-bold text-barber-accent">
          Carrello @if (cartCount > 0) {
          ({{ cartCount }})
        }
        </a>
      </div>
    </div>
  }
</header>
