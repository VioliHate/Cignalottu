<header class="bg-barber-dark text-barber-cream shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">

      <!-- Logo -->
      <div class="flex-1 flex justify-center md:justify-start">
        <a routerLink="/" class="text-3xl md:text-4xl font-black tracking-tight text-barber-cream">
          Cignalottu
        </a>
      </div>

      <!-- Nav desktop -->
      <nav class="hidden md:flex items-center justify-center flex-1 gap-x-8 lg:gap-x-12">
        <a routerLink="/cat1" routerLinkActive="text-barber-blue font-semibold border-b-2 border-barber-blue pb-1"
           class="text-barber-cream hover:text-barber-blue transition text-base font-medium">
          Cat1
        </a>
        <a routerLink="/cat2" routerLinkActive="text-barber-blue font-semibold border-b-2 border-barber-blue pb-1"
           class="text-barber-cream hover:text-barber-blue transition text-base font-medium">
          Cat2
        </a>
        <a routerLink="/cat3" routerLinkActive="text-barber-blue font-semibold border-b-2 border-barber-blue pb-1"
           class="text-barber-cream hover:text-barber-blue transition text-base font-medium">
          Cat3
        </a>

        <a routerLink="/offerte" class="text-barber-red hover:text-red-300 font-semibold text-base">
          Offerte
        </a>
      </nav>

      <!-- Right side -->
      <div class="flex items-center gap-x-5 sm:gap-x-7 flex-1 justify-end">
        <a routerLink="/account" class="text-barber-cream hover:text-barber-blue transition hidden sm:block">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </a>

        <a routerLink="/carrello" class="text-barber-cream hover:text-barber-blue transition relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          @if (cartCount > 0) {
            <span class="absolute -top-1.5 -right-1.5 bg-barber-red text-barber-cream text-xs font-bold rounded-full min-w-5 h-5 flex items-center justify-center px-1">
              {{ cartCount }}
            </span>
          }
        </a>

        <button class="md:hidden text-barber-cream hover:text-barber-blue" (click)="mobileMenuOpen = !mobileMenuOpen">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <!-- hamburger paths -->
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="md:hidden bg-barber-dark border-t border-barber-blue/30 text-barber-cream">
      <div class="px-5 py-6 space-y-5">
        <a routerLink="/donna" class="block text-lg font-medium hover:text-barber-blue">Donna</a>
        <a routerLink="/carrello" class="block text-lg font-medium hover:text-barber-blue">
          Carrello @if (cartCount > 0) { ({{ cartCount }}) }
        </a>
      </div>
    </div>
  }
</header>
