<header class="sticky top-0 z-50 border-b bg-white/80 backdrop-blur-md border-b-barber-border">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <a routerLink="/" class="text-2xl font-bold tracking-tight flex items-center gap-3 hover:opacity-90 transition-opacity">
        <div class="w-17 h-17 shrink-0 overflow-hidden rounded-full border-2 border-barber-border shadow-sm">
          <img
            ngSrc="/icon.jpg"
            alt="Cignalottu"
            width="784"
            height="1168"
            class="w-full h-full object-cover"
            priority
          />
        </div>
        <span>Cignalottu</span>
      </a>

      <!-- Nav desktop -->
      <nav class="hidden md:flex items-center gap-x-8 text-sm font-medium">
        <a routerLink="/cat1" class="hover:text-barber-red">
          Cat1
        </a>
        <a routerLink="/cat2" class="hover:text-barber-red">
          Cat2
        </a>
        <a routerLink="/cat3" class="hover:text-barber-red">
          Cat3
        </a>
        <a routerLink="/offerte" class="text-barber-red">
          Offerte
        </a>
      </nav>

      <!-- Right side icons -->
      <div class="flex items-center gap-x-5">

        <a routerLink="/login" class="hidden sm:block">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </a>

        <a routerLink="/carrello" class="relative">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
          </svg>

          @if (cartCount > 0) {
            <span class="absolute -top-1.5 -right-1.5 bg-barber-red text-barber-cream text-[10px] font-medium rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-1">
              {{ cartCount }}
            </span>
          }
        </a>

        <!-- Hamburger -->
        <button class="md:hidden" (click)="mobileMenuOpen = !mobileMenuOpen">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            @if (!mobileMenuOpen) {
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            }
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="md:hidden bg-barber-dark border-t border-barber-dark/30">
      <div class="px-4 py-5 space-y-4 text-sm">
        <a routerLink="/cat1" class="block hover:text-barber-red">Cat1</a>
        <a routerLink="/cat2" class="block hover:text-barber-red">Cat2</a>
        <a routerLink="/cat3" class="block hover:text-barber-red">Cat3</a>
        <a routerLink="/offerte" class="block text-barber-red">Offerte</a>
        <a routerLink="/account" class="block">Account</a>
        <a routerLink="/carrello" class="block">
          Carrello @if (cartCount > 0) { ({{ cartCount }}) }
        </a>
      </div>
    </div>
  }
</header>
