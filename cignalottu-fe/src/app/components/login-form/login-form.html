<div
  class="relative grid w-full max-w-4xl overflow-hidden rounded-[2.5rem] bg-white shadow-2xl md:grid-cols-2"
>
  <!--Left-->
  <div class="relative hidden md:block">
    <img
      ngSrc="/login.jpg"
      alt="Auth Background"
      class="h-full w-full object-cover"
      height="1248"
      width="832"
    />
  </div>
  <!--Right-->
  <div class="w-full max-w-sm bg-white rounded-br-lg border border-gray-200 overflow-hidden">
    <div class="flex border-b border-gray-200">
      <button
        type="button"
        (click)="toggleLogin(true)"
        class="flex-1 py-4 text-sm font-medium"
        [ngClass]="{
          'text-barber-text border-b border-barber-red': isLogin(),
          'text-gray-400': !isLogin(),
        }"
      >
        Accedi
      </button>

      <button
        type="button"
        (click)="toggleLogin(false)"
        class="flex-1 py-4 text-sm font-medium"
        [ngClass]="{
          'text-barber-text border-b border-barber-red': !isLogin(),
          'text-gray-400': isLogin(),
        }"
      >
        Registrati
      </button>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="p-8 space-y-6">
      @if (!isLogin()) {
        <div class="space-y-4">
          <label
            class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-400"
          >
            <lucide-icon [name]="userIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
            Dati Utente
          </label>
          <div class="ms-2 ps-6 border-s border-gray-100 space-y-5">
            <div>
              <label class="block mb-1.5 text-xs font-medium text-gray-600"> Nome </label>
              <div class="relative">
                <input
                  type="text"
                  [(ngModel)]="firstName"
                  name="firstName"
                  placeholder="Mario"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-barber-red/40 focus:ring-1 focus:ring-barber-red/10 transition-all"
                />
              </div>
            </div>

            <div>
              <label class="block mb-1.5 text-xs font-medium text-gray-600"> Cognome </label>
              <div class="relative">
                <input
                  type="text"
                  [(ngModel)]="lastName"
                  name="lastName"
                  placeholder="Rossi"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-barber-red/40 focus:ring-1 focus:ring-barber-red/10 transition-all"
                />
              </div>
            </div>
          </div>
        </div>
      }

      <!-- Email -->
      <div>
        <div>
          <label class="flex items-center gap-2 mb-1.5 text-xs font-medium text-gray-600">
            <lucide-icon [name]="mailIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
            Email
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="nome@esempio.it"
            required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-barber-red/40 focus:ring-1 focus:ring-barber-red/10 transition-all"
          />
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-1.5">
          <label class="flex items-center gap-2 text-xs font-medium text-gray-600">
            <lucide-icon [name]="lockIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
            Password
          </label>

          @if (isLogin()) {
            <button type="button" class="text-xs text-red-600 hover:underline">Dimenticata?</button>
          }
        </div>

        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-barber-red/40 focus:ring-1 focus:ring-barber-red/10 transition-all"
          />

          <button
            type="button"
            (click)="toggleShowPassword()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-800"
          >
            <lucide-icon
              [name]="showPassword() ? eyeIcon : eyeOffIcon"
              class="w-5 h-5"
            ></lucide-icon>
          </button>
        </div>
      </div>

      <!-- Bottone submit -->
      <button
        type="button"
        (click)="onSubmit()"
        class="w-full bg-barber-primary text-white py-3.5 rounded-xl font-medium text-sm tracking-wide hover:bg-barber-primary/80 transition-colors flex items-center justify-center gap-2"
      >
        {{ isLogin() ? 'Accedi' : 'Crea account' }}
        <lucide-icon [name]="arrowRightIcon" class="w-4 h-4"></lucide-icon>
      </button>
    </form>
    <!-- Sezione google login -->
    @if (isLogin()) {
      <div class="flex flex-col items-center gap-4 -translate-y-1/6">
        <p class="text-[10px] uppercase font-bold tracking-widest bg-barber-primary/30">
          Oppure continua con
        </p>
        <div class="flex gap-4 w-1/4">
          <button
            (click)="loginWithGoogle()"
            class="flex-1 border bg-barber-primary/10 rounded-2xl py-3.5 flex items-center justify-center transition-all group"
          >
            <img
              ngSrc="https://www.google.com/favicon.ico"
              width="64"
              height="64"
              alt="Google"
              class="w-6 h-6 grayscale opacity-50 group-hover:grayscale-0 group-hover:opacity-100 transition-all"
            />
          </button>
        </div>
      </div>
    }

    <p class="mt-8 text-center text-sm text-neutral-500">
      @if (isLogin()) {
        Non hai un account?
      } @else {
        "Hai già un account?"
      }
      <button (click)="switchIsLogin()" className="font-bold text-barber-accent hover:underline">
        @if (isLogin()) {
          Registrati
        } @else {
          "Accedi"
        }
      </button>
    </p>
  </div>
</div>
