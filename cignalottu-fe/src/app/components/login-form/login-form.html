<div class="w-full max-w-sm bg-white rounded-2xl border border-gray-200 overflow-hidden">

  <div class="flex border-b border-gray-200">
    <button
      type="button"
      (click)="toggleLogin(true)"
      class="flex-1 py-4 text-sm font-medium"
      [ngClass]="{'text-black border-b border-barber-blue': isLogin(),
    'text-gray-400': !isLogin()}">Accedi
    </button>

    <button
      type="button"
      (click)="toggleLogin(false)"
      class="flex-1 py-4 text-sm font-medium"
      [ngClass]="{'text-black border-b border-barber-blue': !isLogin(),
    'text-gray-400': isLogin()}">Registrati
    </button>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="p-8 space-y-6">

    @if (!isLogin()) {
      <div>
        <label class="flex items-center gap-2 mb-1.5 text-xs font-medium text-gray-600">
          <lucide-icon
            [name]="userIcon"
            class="w-4 h-4 text-gray-500"></lucide-icon>
          Nome completo
        </label>
        <div class="relative">
          <input
            type="text"
            placeholder="Mario Rossi"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-200"
          />
        </div>
      </div>
    }

    <!-- Email -->
    <div>
      <div>
        <label class="flex items-center gap-2 mb-1.5 text-xs font-medium text-gray-600">
          <lucide-icon [name]="mailIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
          Email
        </label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="emailChange.emit($event)"
          name="email"
          placeholder="nome@esempio.it"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-200"
        />
      </div>
    </div>

    <div>
      <div class="flex justify-between items-center mb-1.5">
        <label class="flex items-center gap-2 text-xs font-medium text-gray-600">
          <lucide-icon [name]="lockIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
          Password
        </label>

        @if (isLogin()) {
          <button type="button" class="text-xs text-red-600 hover:underline">
            Dimenticata?
          </button>
        }
      </div>

      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [ngModel]="password()"
          (ngModelChange)="passwordChange.emit($event)"
          name="password"
          placeholder="••••••••"
          required
          class="w-full pl-4 pr-12 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-200"
        />

        <button
          type="button"
          (click)="toggleShowPassword()"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-800"
        >
          <lucide-icon
            [name]="showPassword() ? 'eye' : 'eye-off'"
            class="w-5 h-5"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Bottone submit -->
    <button
      type="submit"
      class="w-full bg-barber-dark text-white py-3.5 rounded-xl font-medium text-sm tracking-wide hover:bg-barber-dark/80 transition-colors flex items-center justify-center gap-2"
    >
      {{ isLogin() ? 'Accedi' : 'Crea account' }}
      <lucide-icon [name]="arrowRightIcon" class="w-4 h-4"></lucide-icon>
    </button>
  </form>
  <!-- Sezione google login -->
  @if (isLogin()) {
    <div class="flex flex-col items-center gap-4 -translate-y-1/6">
      <p class="text-[10px] uppercase font-bold tracking-widest text-barber-dark/30">Oppure continua con</p>
      <div class="flex gap-4 w-1/4">
        <button
          class="flex-1 border border-barber-dark/10 rounded-2xl py-3.5 flex items-center justify-center transition-all group">
          <img src="https://www.google.com/favicon.ico" alt="Google"
               class="w-4 h-4 grayscale opacity-50 group-hover:grayscale-0 group-hover:opacity-100 transition-all"
               referrerPolicy="no-referrer"/>
        </button>
      </div>
    </div>
  }
</div>
